name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.3', '8.4']

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Check refactoring
        run: vendor/bin/rector process --dry-run

      - name: Run static analysis
        run: vendor/bin/phpstan analyse

      - name: Run tests
        run: vendor/bin/pest --coverage --min=95

  lint-kotlin:
    runs-on: ubuntu-latest
    name: Kotlin Lint
    steps:
      - uses: actions/checkout@v5

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/latest/download/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: Lint Kotlin files
        run: ktlint "resources/android/src/**/*.kt"

  lint-swift:
    runs-on: macos-latest
    name: Swift Lint
    steps:
      - uses: actions/checkout@v5

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Swift files
        run: swiftlint lint --strict --config resources/ios/.swiftlint.yml resources/ios/Sources/
